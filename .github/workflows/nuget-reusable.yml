name: reusable-nuget

on:
  workflow_call:
    inputs:
      package_csprojs:
        description: |
          Multiline list of .csproj paths (relative to repo root) to pack
          and push to GitHub Packages. One csproj per line.
        required: true
        type: string
      dotnet_version:
        description: .NET SDK version (e.g., "10.0.x").
        required: false
        default: "10.0.x"
        type: string
      environment_name:
        description: GitHub environment for gating the publish.
        required: false
        default: Production
        type: string
      release_version:
        description: Semver string produced by the upstream semantic-release job (e.g. 1.2.3). Empty when no release was published on this push — pack + push are then skipped.
        required: false
        default: ""
        type: string
      release_published:
        description: "'true' when the upstream semantic-release job published a new release on this push, 'false' otherwise. Gates pack + push."
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  build_and_push:
    name: Build and Push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate PR title follows Conventional Commits
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Build packages (validation)
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "${proj// }" ] && continue
            echo "::group::dotnet build $proj"
            dotnet build "$proj" --configuration Release
            echo "::endgroup::"
          done <<< "${{ inputs.package_csprojs }}"

      - name: Pack at release version
        if: inputs.release_published == 'true'
        shell: bash
        env:
          VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          while IFS= read -r proj; do
            [ -z "${proj// }" ] && continue
            echo "::group::dotnet pack $proj at $VERSION"
            dotnet pack "$proj" \
              --configuration Release \
              -p:Version="$VERSION" \
              --output "$GITHUB_WORKSPACE/artifacts"
            echo "::endgroup::"
          done <<< "${{ inputs.package_csprojs }}"

      - name: Push to GitHub Packages
        if: inputs.release_published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.repository_owner }}" \
            --password "${{ github.token }}" \
            --store-password-in-clear-text
          dotnet nuget push "$GITHUB_WORKSPACE/artifacts/*.nupkg" \
            --source github \
            --api-key "${{ github.token }}" \
            --skip-duplicate
