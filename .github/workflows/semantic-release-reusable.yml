name: reusable-semantic-release

# Runs semantic-release exactly once per push to the release branch and emits
# the resolved version. Pair with container-workflow.yml (release_version
# input) so parallel container build jobs share a single, race-free release.
#
# A concurrency group keyed on the repo name serializes any accidental
# duplicate invocations (e.g. two callers in the same workflow), so the
# `refs/notes/semantic-release-*` git note push can't race itself.

on:
  workflow_call:
    inputs:
      release_branch:
        description: Branch that triggers semantic-release (typically main).
        required: false
        default: main
        type: string
    secrets:
      REPO_PAT:
        description: GitHub PAT used by semantic-release to push tags, releases and the per-version git note. Fine-grained or classic.
        required: true
    outputs:
      release_version:
        description: Version generated by semantic-release (empty when no release was published).
        value: ${{ jobs.release.outputs.release_version }}
      release_published:
        description: "'true' when a new release was published on this run, 'false' otherwise."
        value: ${{ jobs.release.outputs.release_published }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: semantic-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', inputs.release_branch)
    outputs:
      release_version: ${{ steps.release.outputs.new_release_version }}
      release_published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run semantic-release
        id: release
        uses: amirpouyan-haghighat/pipeline-templates/.github/actions/semantic-release@main
        with:
          release_branch: ${{ inputs.release_branch }}
          repo_token: ${{ secrets.REPO_PAT }}
          github_token: ${{ github.token }}
