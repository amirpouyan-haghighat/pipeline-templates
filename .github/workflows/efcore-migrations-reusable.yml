name: reusable-efcore-migrations

# Reusable workflow that plans, gates, and applies EF Core migrations against
# an Azure Database for PostgreSQL Flexible Server with Entra-only authentication.
#
# Three jobs (mirrors terraform-reusable.yml):
#   plan    — runs on every PR and main push. Asserts the DbContext model is in
#             sync with the migration history (catches forgotten `migrations add`),
#             detects new migrations vs origin/main, generates an idempotent SQL
#             script from that baseline, and uploads it as an artifact.
#   approve — runs only on main when plan saw new migrations. Uses GitHub
#             Environment protection plus a manual approval issue.
#   apply   — runs only after approve. Logs into Azure via OIDC (the calling
#             principal must be a member of the Postgres-admin Entra group, e.g.
#             Platform-Admin), then runs `dotnet ef database update`.
#
# Concurrency group serializes applies per repository + environment so two
# pushes to main cannot race.

on:
  workflow_call:
    inputs:
      project_path:
        description: Path to the .csproj that owns EF migrations.
        required: true
        type: string
      dotnet_version:
        description: .NET SDK version to install on the runner.
        required: false
        default: "10.0.x"
        type: string
      db_host:
        description: Postgres server FQDN (e.g. psql-nftx-prod.postgres.database.azure.com).
        required: true
        type: string
      db_name:
        description: Logical database name on the server.
        required: true
        type: string
      db_username:
        description: |
          Postgres role mapped to an Entra principal or group the calling
          AZURE_CLIENT_ID is a member of. Typically a group name such as
          "Platform-Admin" registered via pgaadauth_create_principal.
        required: true
        type: string
      environment_name:
        description: GitHub environment used to gate the apply step.
        required: false
        default: Production
        type: string
    secrets:
      # Azure secrets are consumed only by the `apply` job, which runs inside
      # the GitHub Environment named by `environment_name`. Declared as
      # required:false so the workflow_call validation (which happens at the
      # caller's job scope, NOT the environment scope) does not reject the
      # call when the caller stores these at the environment level rather
      # than the repository level. azure/login fails fast at apply-time with
      # a clear error if they end up missing in scope.
      AZURE_CLIENT_ID:
        description: Azure AD application client ID. Must hold DDL grants on the target DB (typically via Entra-group membership in Platform-Admin). Required at apply-time; not consumed by plan.
        required: false
      AZURE_TENANT_ID:
        description: Azure AD tenant ID that owns the service principal. Required at apply-time; not consumed by plan.
        required: false
      AZURE_SUBSCRIPTION_ID:
        description: Azure subscription ID hosting the Postgres server. Required at apply-time; not consumed by plan.
        required: false
      NIFTROX_FEED:
        description: |
          Optional classic GitHub PAT (read:packages). When provided, the workflow
          exports it as the NIFTROX_FEED environment variable on the runner; it is
          NOT wired into a `dotnet nuget add source` step. The consumer project's
          nuget.config must do the substitution itself (typically with
          `<ClearTextPassword>%NIFTROX_FEED%</ClearTextPassword>`). Omit the secret
          entirely if your restore does not need a private feed.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Migration Plan
    runs-on: ubuntu-latest
    env:
      NIFTROX_FEED: ${{ secrets.NIFTROX_FEED }}
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      base: ${{ steps.detect.outputs.base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Build
        run: dotnet build "${{ inputs.project_path }}" --no-restore -c Release

      - name: Assert model matches migrations
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project "${{ inputs.project_path }}" \
            --no-build || {
              echo "::error::DbContext model has changes not captured in a migration. Run 'dotnet ef migrations add <Name>' and commit the result."
              exit 1
            }

      - name: Detect new migrations
        id: detect
        run: |
          set -euo pipefail
          new=$(git diff --name-only --diff-filter=A origin/main...HEAD \
            -- '**/Migrations/*.cs' 2>/dev/null \
            | grep -vE 'Designer\.cs$|ModelSnapshot\.cs$' || true)
          if [ -z "$new" ]; then
            echo "No new migration files added vs origin/main."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "base=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_on_main=$(git ls-tree -r origin/main --name-only 2>/dev/null \
            | grep -E '/Migrations/[0-9]{14}_[A-Za-z0-9_]+\.cs$' \
            | grep -vE 'Designer\.cs$|ModelSnapshot\.cs$' \
            | sed -E 's|.*/([0-9]{14}_[A-Za-z0-9_]+)\.cs|\1|' \
            | sort | tail -1 || true)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "base=${last_on_main:-0}" >> "$GITHUB_OUTPUT"
          echo "New migrations detected. Baseline on main: ${last_on_main:-<none>}"
          echo "$new"

      - name: Generate idempotent migration SQL
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          dotnet ef migrations script "${{ steps.detect.outputs.base }}" \
            --project "${{ inputs.project_path }}" \
            --idempotent --no-build \
            --output migration.sql
          echo "::group::Migration SQL"
          cat migration.sql
          echo "::endgroup::"

      - name: Upload migration SQL
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: migration-sql
          path: migration.sql
          if-no-files-found: error

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: plan
    if: |
      success() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.plan.outputs.has_changes == 'true'
    environment:
      name: ${{ inputs.environment_name }}
    permissions:
      issues: write
    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: amirpouyan-haghighat
          minimum-approvals: 1
          issue-title: "Approve EF migration apply for ${{ github.repository }}"
          issue-body: |
            A new EF Core migration is queued to apply to ${{ inputs.environment_name }}.
            Review the `migration-sql` artifact on the run that triggered this approval.

  apply:
    name: Migration Apply
    runs-on: ubuntu-latest
    needs:
      - plan
      - approve
    if: |
      success() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.plan.outputs.has_changes == 'true'
    environment:
      name: ${{ inputs.environment_name }}
    concurrency:
      group: db-migrations-${{ github.repository }}-${{ inputs.environment_name }}
      cancel-in-progress: false
    env:
      NIFTROX_FEED: ${{ secrets.NIFTROX_FEED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mint Postgres Entra token and build connection string
        run: |
          # The EF design-time DbContext factory (ApplicationDbContextFactory)
          # uses UseNpgsql(connectionString) directly — it does NOT call
          # UseEntraAuthentication, so the connection string MUST carry a
          # password. We mint a fresh Entra access token scoped to Azure DB
          # for PostgreSQL (oss-rdbms), mask it from logs, and write the
          # composed connection string into the job environment. Token TTL
          # is 5–60 min; an apply takes seconds, no refresh needed.
          token=$(az account get-access-token --resource-type oss-rdbms --query accessToken -o tsv)
          echo "::add-mask::$token"
          conn="Host=${{ inputs.db_host }};Database=${{ inputs.db_name }};Username=${{ inputs.db_username }};Password=${token};SslMode=Require;"
          echo "Database__ConnectionString=${conn}" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Build
        run: dotnet build "${{ inputs.project_path }}" --no-restore -c Release

      - name: Apply migrations
        run: |
          dotnet ef database update \
            --project "${{ inputs.project_path }}" \
            --no-build
