name: reusable-efcore-migrations

on:
  workflow_call:
    inputs:
      project_path:
        description: Path to the .csproj that owns EF migrations.
        required: true
        type: string
      dotnet_version:
        description: .NET SDK version to install on the runner.
        required: false
        default: "10.0.x"
        type: string
      db_host:
        description: Postgres server FQDN (e.g. psql-nftx-prod.postgres.database.azure.com).
        required: true
        type: string
      db_name:
        description: Logical database name on the server.
        required: true
        type: string
      db_username:
        description: Postgres role mapped to an Entra principal or group the calling AZURE_CLIENT_ID is a member of (e.g. "Platform-Admin").
        required: true
        type: string
      environment_name:
        description: GitHub environment name used to gate the apply step.
        required: false
        default: Production
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: Azure AD service principal client ID. Must be a member of the Postgres-admin Entra group.
        required: true
      AZURE_TENANT_ID:
        description: Azure AD tenant ID that owns the service principal.
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: Subscription hosting the Postgres server.
        required: true
      NIFTROX_FEED:
        description: Classic GitHub PAT with read:packages used by dotnet restore for the private NuGet feed. Optional.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Migration Plan
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    env:
      NIFTROX_FEED: ${{ secrets.NIFTROX_FEED }}
      # has-pending-model-changes / migrations script never open a connection;
      # the design-time factory just needs a parse-valid placeholder.
      Database__ConnectionString: Host=design.invalid;Database=design;Username=design
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      base: ${{ steps.detect.outputs.base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Build
        run: dotnet build "${{ inputs.project_path }}" --no-restore -c Release

      - name: Assert model matches migrations
        run: dotnet ef migrations has-pending-model-changes --project "${{ inputs.project_path }}" --no-build

      - name: Detect new migrations
        id: detect
        run: |
          set -euo pipefail
          new=$(git diff --name-only --diff-filter=A origin/main...HEAD \
            -- '**/Migrations/*.cs' 2>/dev/null \
            | grep -vE 'Designer\.cs$|ModelSnapshot\.cs$' || true)
          if [ -z "$new" ]; then
            echo "No new migration files added vs origin/main."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "base=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_on_main=$(git ls-tree -r origin/main --name-only 2>/dev/null \
            | grep -E '/Migrations/[0-9]{14}_[A-Za-z0-9_]+\.cs$' \
            | grep -vE 'Designer\.cs$|ModelSnapshot\.cs$' \
            | sed -E 's|.*/([0-9]{14}_[A-Za-z0-9_]+)\.cs|\1|' \
            | sort | tail -1 || true)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "base=${last_on_main:-0}" >> "$GITHUB_OUTPUT"
          echo "New migrations detected. Baseline on main: ${last_on_main:-<none>}"
          echo "$new"

      - name: Generate idempotent migration SQL
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          dotnet ef migrations script "${{ steps.detect.outputs.base }}" \
            --project "${{ inputs.project_path }}" \
            --idempotent --no-build \
            --output migration.sql
          echo "::group::Migration SQL"
          cat migration.sql
          echo "::endgroup::"

      - name: Upload migration SQL
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: migration-sql
          path: migration.sql
          if-no-files-found: error

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: plan
    if: success() && needs.plan.outputs.has_changes == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: ${{ inputs.environment_name }}

    permissions:
      issues: write

    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: amirpouyan-haghighat
          minimum-approvals: 1
          issue-title: "Manual Approval Required for EF Migration Apply"
          issue-body: "A new EF Core migration is queued. Review the migration-sql artifact before approving."

  apply:
    name: Migration Apply
    needs:
      - plan
      - approve
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    concurrency:
      group: db-migrations-${{ github.repository }}-${{ inputs.environment_name }}
      cancel-in-progress: false
    env:
      NIFTROX_FEED: ${{ secrets.NIFTROX_FEED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mint Postgres token and compose connection string
        run: |
          token=$(az account get-access-token --resource-type oss-rdbms --query accessToken -o tsv)
          echo "::add-mask::$token"
          echo "Database__ConnectionString=Host=${{ inputs.db_host }};Database=${{ inputs.db_name }};Username=${{ inputs.db_username }};Password=$token;SslMode=Require;" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Build
        run: dotnet build "${{ inputs.project_path }}" --no-restore -c Release

      - name: Apply migrations
        run: dotnet ef database update --project "${{ inputs.project_path }}" --no-build
