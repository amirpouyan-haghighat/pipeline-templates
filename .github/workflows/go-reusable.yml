name: reusable-go

on:
  workflow_call:
    inputs:
      working_directory:
        description: Path to the Go module to build and test.
        required: false
        default: "."
        type: string
      go_version:
        description: Go version to install. Callers must set this explicitly (e.g. "1.22").
        required: true
        type: string
      environment_name:
        description: GitHub environment for gating the job.
        required: false
        default: Production
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate PR title follows Conventional Commits
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go_version }}

      - name: Download modules
        working-directory: ${{ inputs.working_directory }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: go test ./...

      - name: Build
        working-directory: ${{ inputs.working_directory }}
        run: go build ./...
